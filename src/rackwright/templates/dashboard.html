<html lang="en">
<head><meta charset="utf-8"><title>Dashboard</title></head>
<body>
  <h1>Dashboard</h1>
  <h2>Create Project from Template</h2>
  <form method="post" action="{{ url_for('project_new_from_template') }}">
    <label>Project Name <input name="project_name" required></label><br>
    <label>Owner <input name="owner"></label><br>
    <label>Notes <textarea name="notes"></textarea></label><br>
    <label>Template Set
      <select name="template_set_id">
        {% for ts in template_sets %}
          <option value="{{ ts.id }}">{{ ts.name }}</option>
        {% endfor %}
      </select>
    </label><br>
    <button type="submit">Create</button>
  </form>

  <h2>Projects</h2>
  <ul>
    {% for project in projects %}
      <li>
        <a href="{{ url_for('project_detail', project_id=project.id) }}">{{ project.name }}</a>
        {% if latest_versions.get(project.id) %}
          (latest v{{ latest_versions[project.id].version_number }})
        {% endif %}
      </li>
    {% else %}
      <li>No projects.</li>
    {% endfor %}
  </ul>

  <p><a href="{{ url_for('template_sets_list') }}">Template Sets</a></p>
</body>
</html>
